<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sixtyfour</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <script type="module" src="/assets/js/main.js"></script>
  </head>
  <body class="display">

    <nav id="primary-strip" class="strip" aria-label="Mode" aria-hidden="true">
      <button class="strip-arrow" id="primary-prev"></button>
      <div class="strip-scroll" id="primary-scroll" role="list"></div>
      <button class="strip-arrow" id="primary-next"></button>
    </nav>

    <div class="display-wrap">
      <canvas id="display" width="64" height="64"></canvas>
      <div id="grid-overlay"></div>
    </div>

    <nav id="secondary-strip" class="strip" aria-label="Sub-mode" aria-hidden="true">
      <button class="strip-arrow" id="secondary-prev"></button>
      <div class="strip-scroll" id="secondary-scroll" role="list"></div>
      <button class="strip-arrow" id="secondary-next"></button>
    </nav>

  </body>
</html>
